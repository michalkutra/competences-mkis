<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><meta name="robots" content="noindex"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Podgląd wariant 2</title><style>body{font-family:-apple-system,sans-serif;max-width:760px;margin:0 auto;padding:24px;line-height:1.5}.card{border:1px solid #ddd;border-radius:12px;padding:18px;margin:16px 0;background:#fafafa}.meta{font-size:12px;color:#888;font-weight:600;text-transform:uppercase}.figure-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin-top:8px}.figure-cell{border:2px solid #bbb;border-radius:8px;min-height:86px;display:flex;align-items:center;justify-content:center;gap:5px;background:#fff;padding:5px;flex-wrap:wrap}.bottom-right{font-size:28px;color:#c0392b;font-weight:700}.opts{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.opt{border:2px solid #bbb;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:3px;background:#fff;flex-wrap:wrap}.opt.correct{border-color:#2e9d52;background:#eefaf0}.lbl{font-weight:600;color:#555;margin-left:3px}.exp{font-size:13px;background:#fff;border-left:3px solid #2e9d52;padding:8px 12px;margin-top:12px;border-radius:4px}</style></head><body><h1>Podgląd wariant 2 — realne dane</h1><div id="root"></div><script>var Q=[{"id":"h_t8_001","typeId":8,"level":"hard","instruction":"W tym zadaniu musisz ustalić odpowiednie powiązania między figurami. Tylko jedna odpowiedź jest poprawna. Uzupełnij brakującą odpowiedź.","grid":{"topLeft":{"shape":"triangle","fill":"empty"},"bottomLeft":[{"shape":"triangle","fill":"solid"}],"topRight":{"shape":"square","fill":"empty"}},"options":[[{"shape":"square","fill":"solid"}],[{"shape":"square","fill":"empty"}],[{"shape":"triangle","fill":"solid"}],[{"shape":"square","fill":"dot-center"}],[{"shape":"triangle","fill":"empty"}]],"correct":0,"explanation":"Jedna figura. figura 1: wiersz → kształt, kolumna → wypełnienie. Brakujące pole: kwadrat pełne. Opcja A — poprawna."},{"id":"h_t8_016","typeId":8,"level":"hard","instruction":"W tym zadaniu musisz ustalić odpowiednie powiązania między figurami. Tylko jedna odpowiedź jest poprawna. Uzupełnij brakującą odpowiedź.","grid":{"topLeft":[{"shape":"circle","fill":"solid"},{"shape":"square","fill":"dot-center"}],"bottomLeft":[{"shape":"circle","fill":"x"},{"shape":"square","fill":"x"}],"topRight":[{"shape":"square","fill":"solid"},{"shape":"triangle","fill":"dot-center"}]},"options":[[{"shape":"square","fill":"x"},{"shape":"triangle","fill":"x"}],[{"shape":"square","fill":"solid"},{"shape":"triangle","fill":"x"}],[{"shape":"circle","fill":"x"},{"shape":"triangle","fill":"x"}],[{"shape":"square","fill":"empty"},{"shape":"triangle","fill":"x"}],[{"shape":"square","fill":"x"},{"shape":"triangle","fill":"dot-center"}]],"correct":0,"explanation":"2 niezależne figury, każda z własną regułą. figura 1: wiersz → kształt, kolumna → wypełnienie · figura 2: wiersz → kształt, kolumna → wypełnienie. Brakujące pole: kwadrat przekreślone; trójkąt przekreślone. Opcja A — poprawna."},{"id":"h_t8_038","typeId":8,"level":"hard","instruction":"W tym zadaniu musisz ustalić odpowiednie powiązania między figurami. Tylko jedna odpowiedź jest poprawna. Uzupełnij brakującą odpowiedź.","grid":{"topLeft":[{"shape":"circle","fill":"solid"},{"shape":"triangle","fill":"dot-center"},{"shape":"circle","fill":"x"}],"bottomLeft":[{"shape":"circle","fill":"dot-center"},{"shape":"triangle","fill":"x"},{"shape":"circle","fill":"empty"}],"topRight":[{"shape":"square","fill":"solid"},{"shape":"circle","fill":"dot-center"},{"shape":"square","fill":"x"}]},"options":[[{"shape":"square","fill":"solid"},{"shape":"circle","fill":"x"},{"shape":"square","fill":"empty"}],[{"shape":"square","fill":"dot-center"},{"shape":"circle","fill":"x"},{"shape":"square","fill":"empty"}],[{"shape":"circle","fill":"dot-center"},{"shape":"circle","fill":"x"},{"shape":"square","fill":"empty"}],[{"shape":"square","fill":"dot-center"},{"shape":"circle","fill":"dot-center"},{"shape":"square","fill":"empty"}]],"correct":1,"explanation":"3 niezależne figury, każda z własną regułą. figura 1: wiersz → kształt, kolumna → wypełnienie · figura 2: wiersz → kształt, kolumna → wypełnienie · figura 3: wiersz → kształt, kolumna → wypełnienie. Brakujące pole: kwadrat z kropką; koło przekreślone; kwadrat puste. Opcja B — poprawna."},{"id":"h_t8_031","typeId":8,"level":"hard","instruction":"W tym zadaniu musisz ustalić odpowiednie powiązania między figurami. Tylko jedna odpowiedź jest poprawna. Uzupełnij brakującą odpowiedź.","grid":{"topLeft":[{"shape":"square","fill":"solid","rot":0},{"shape":"triangle","fill":"x","rot":0},{"shape":"triangle","fill":"empty","rot":0}],"bottomLeft":[{"shape":"square","fill":"x","rot":0},{"shape":"triangle","fill":"dot-center","rot":0},{"shape":"triangle","fill":"empty","rot":90}],"topRight":[{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"x","rot":90},{"shape":"triangle","fill":"x","rot":0}]},"options":[[{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"dot-center","rot":90},{"shape":"triangle","fill":"x","rot":90}],[{"shape":"square","fill":"x","rot":0},{"shape":"triangle","fill":"dot-center","rot":90},{"shape":"triangle","fill":"x","rot":90}],[{"shape":"square","fill":"x","rot":45},{"shape":"triangle","fill":"dot-center","rot":90},{"shape":"triangle","fill":"x","rot":90}],[{"shape":"square","fill":"empty","rot":45},{"shape":"triangle","fill":"dot-center","rot":90},{"shape":"triangle","fill":"x","rot":90}]],"correct":2,"explanation":"3 niezależne figury, każda z własną regułą. figura 1: wiersz → obrót, kolumna → wypełnienie · figura 2: wiersz → obrót, kolumna → wypełnienie · figura 3: wiersz → wypełnienie, kolumna → obrót. Brakujące pole: kwadrat przekreślone (obrót 45°); trójkąt z kropką (obrót 90°); trójkąt przekreślone (obrót 90°). Opcja C — poprawna."}];
function renderFigure(spec,size){size=size||56;var stroke="#333",sw="2.5",interior="",shapeFill="white";if(spec.fill==="solid")shapeFill="#333";var s="";if(spec.shape==="square"){s='<rect x="12" y="12" width="56" height="56" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';}else if(spec.shape==="triangle"){s='<polygon points="40,10 70,68 10,68" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linejoin="round"/>';}else{s='<circle cx="40" cy="40" r="30" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';}if(spec.fill==="x"){if(spec.shape==="square"){interior='<line x1="14" y1="14" x2="66" y2="66" stroke="#333" stroke-width="2"/><line x1="66" y1="14" x2="14" y2="66" stroke="#333" stroke-width="2"/>';}else if(spec.shape==="triangle"){interior='<line x1="30" y1="44" x2="50" y2="60" stroke="#333" stroke-width="2"/><line x1="50" y1="44" x2="30" y2="60" stroke="#333" stroke-width="2"/>';}else{interior='<line x1="19" y1="19" x2="61" y2="61" stroke="#333" stroke-width="2"/><line x1="61" y1="19" x2="19" y2="61" stroke="#333" stroke-width="2"/>';}}else if(spec.fill==="dot-center"){var cy=spec.shape==="triangle"?52:40;interior='<circle cx="40" cy="'+cy+'" r="8" fill="#333"/>';}var inner=s+interior;var rot=spec.rot||0;if(rot)inner='<g transform="rotate('+rot+',40,40)">'+inner+'</g>';return '<svg viewBox="0 0 80 80" width="'+size+'" height="'+size+'">'+inner+'</svg>';}
function nc(c){return Array.isArray(c)?c:[c];}function cell(c,sz){return nc(c).map(function(f){return renderFigure(f,sz);}).join("");}var L=["A","B","C","D","E"];
document.getElementById("root").innerHTML=Q.map(function(q){var g=q.grid;var n=Math.max(nc(g.topLeft).length,nc(g.topRight).length,nc(g.bottomLeft).length);var sz=n>=3?42:(n===2?50:64);var grid='<div class="figure-grid"><div class="figure-cell">'+cell(g.topLeft,sz)+'</div><div class="figure-cell">'+cell(g.topRight,sz)+'</div><div class="figure-cell">'+cell(g.bottomLeft,sz)+'</div><div class="figure-cell bottom-right">?</div></div>';var opts='<div class="opts">'+q.options.map(function(o,i){return '<div class="opt'+(i===q.correct?" correct":"")+'">'+cell(o,Math.round(sz*0.78))+'<span class="lbl">'+L[i]+')</span></div>';}).join("")+'</div>';return '<div class="card"><div class="meta">'+q.id+' · '+q.level+'</div>'+grid+opts+'<div class="exp">'+q.explanation+'</div></div>';}).join("");
</script></body></html>
