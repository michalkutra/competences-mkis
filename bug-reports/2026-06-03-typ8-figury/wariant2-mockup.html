<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Mockup wariant 2 — typ 8</title>
<style>
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;max-width:780px;margin:0 auto;padding:24px;color:#1a1a1a;line-height:1.5}
h1{font-size:22px} .note{font-size:13px;color:#666}
.card{border:1px solid #ddd;border-radius:12px;padding:18px 20px;margin:16px 0;background:#fafafa}
.tier{font-size:12px;font-weight:700;color:#7a5;text-transform:uppercase;letter-spacing:.05em}
.figure-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin-top:8px}
.figure-cell{border:2px solid #bbb;border-radius:8px;min-height:86px;display:flex;align-items:center;justify-content:center;gap:5px;background:#fff;padding:5px;flex-wrap:wrap}
.bottom-right{font-size:28px;color:#c0392b;font-weight:700}
.opts{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.opt{border:2px solid #bbb;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:3px;background:#fff}
.opt.correct{border-color:#2e9d52;background:#eefaf0}
.lbl{font-weight:600;color:#555;margin-left:3px}
.exp{font-size:13px;background:#fff;border-left:3px solid #2e9d52;padding:8px 12px;margin-top:12px;border-radius:4px}
</style></head><body>
<h1>Mockup — wariant 2 (typ 8): gradient T1 → T2 → T3</h1>
<p class="note">Tak będą wyglądać finalne pytania hard. Każda pozycja w komórce to niezależna podmacierz — odpowiedź wyznaczona jednoznacznie. Render prototypowy z obrotem (trójkąt 4 orientacje, kwadrat→romb). Poprawna odpowiedź na zielono.</p>
<div id="root"></div>
<script>
var Q=[{"tier":"T1 — 1 figura","grid":{"TL":[{"shape":"triangle","fill":"empty"}],"TR":[{"shape":"triangle","fill":"solid"}],"BL":[{"shape":"square","fill":"empty"}],"BR":[{"shape":"square","fill":"solid"}]},"exp":"Jedna figura. figura 1: wiersz → wypełnienie, kolumna → kształt.","options":[[{"shape":"square","fill":"solid"}],[{"shape":"square","fill":"empty"}],[{"shape":"triangle","fill":"solid"}],[{"shape":"triangle","fill":"empty"}]],"correct":0,"size":64},{"tier":"T2 — 2 figury (para)","grid":{"TL":[{"shape":"circle","fill":"empty"},{"shape":"square","fill":"x"}],"TR":[{"shape":"triangle","fill":"empty"},{"shape":"square","fill":"dot-center"}],"BL":[{"shape":"circle","fill":"solid"},{"shape":"circle","fill":"x"}],"BR":[{"shape":"triangle","fill":"solid"},{"shape":"circle","fill":"dot-center"}]},"exp":"2 niezależne figury, każda z własną regułą. figura 1: wiersz → kształt, kolumna → wypełnienie · figura 2: wiersz → wypełnienie, kolumna → kształt.","options":[[{"shape":"triangle","fill":"solid"},{"shape":"circle","fill":"dot-center"}],[{"shape":"triangle","fill":"empty"},{"shape":"circle","fill":"dot-center"}],[{"shape":"circle","fill":"solid"},{"shape":"circle","fill":"dot-center"}],[{"shape":"triangle","fill":"solid"},{"shape":"circle","fill":"x"}]],"correct":0,"size":50},{"tier":"T3 — 3 figury + obrót","grid":{"TL":[{"shape":"triangle","fill":"empty","rot":0},{"shape":"square","fill":"empty","rot":0},{"shape":"triangle","fill":"x","rot":0}],"TR":[{"shape":"triangle","fill":"empty","rot":90},{"shape":"square","fill":"solid","rot":0},{"shape":"triangle","fill":"empty","rot":0}],"BL":[{"shape":"triangle","fill":"solid","rot":0},{"shape":"square","fill":"empty","rot":45},{"shape":"triangle","fill":"x","rot":90}],"BR":[{"shape":"triangle","fill":"solid","rot":90},{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"empty","rot":90}]},"exp":"3 niezależne figury, każda z własną regułą. figura 1: wiersz → obrót, kolumna → wypełnienie · figura 2: wiersz → wypełnienie, kolumna → obrót · figura 3: wiersz → wypełnienie, kolumna → obrót.","options":[[{"shape":"triangle","fill":"solid","rot":90},{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"empty","rot":90}],[{"shape":"triangle","fill":"empty","rot":90},{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"empty","rot":90}],[{"shape":"triangle","fill":"solid","rot":0},{"shape":"square","fill":"solid","rot":45},{"shape":"triangle","fill":"empty","rot":90}],[{"shape":"triangle","fill":"solid","rot":90},{"shape":"square","fill":"empty","rot":45},{"shape":"triangle","fill":"empty","rot":90}]],"correct":0,"size":42}];
function renderFigure(spec,size){size=size||56;
  var stroke='#333',sw='2.5',interior='',shapeFill='white';
  if(spec.fill==='solid')shapeFill='#333';
  var s='';
  if(spec.shape==='square'){s='<rect x="12" y="12" width="56" height="56" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';}
  else if(spec.shape==='triangle'){s='<polygon points="40,10 70,68 10,68" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linejoin="round"/>';}
  else{s='<circle cx="40" cy="40" r="30" fill="'+shapeFill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';}
  if(spec.fill==='x'){
    if(spec.shape==='square'){interior='<line x1="14" y1="14" x2="66" y2="66" stroke="'+stroke+'" stroke-width="2"/><line x1="66" y1="14" x2="14" y2="66" stroke="'+stroke+'" stroke-width="2"/>';}
    else if(spec.shape==='triangle'){interior='<line x1="30" y1="44" x2="50" y2="60" stroke="'+stroke+'" stroke-width="2"/><line x1="50" y1="44" x2="30" y2="60" stroke="'+stroke+'" stroke-width="2"/>';}
    else{interior='<line x1="19" y1="19" x2="61" y2="61" stroke="'+stroke+'" stroke-width="2"/><line x1="61" y1="19" x2="19" y2="61" stroke="'+stroke+'" stroke-width="2"/>';}
  }else if(spec.fill==='dot-center'){var cy=spec.shape==='triangle'?52:40;interior='<circle cx="40" cy="'+cy+'" r="8" fill="#333"/>';}
  var inner=s+interior; var rot=spec.rot||0; if(rot)inner='<g transform="rotate('+rot+',40,40)">'+inner+'</g>';
  return '<svg viewBox="0 0 80 80" width="'+size+'" height="'+size+'">'+inner+'</svg>';
}
function cellH(figs,size){return figs.map(function(f){return renderFigure(f,size);}).join('');}
var L=['A','B','C','D'];
document.getElementById('root').innerHTML=Q.map(function(q){
  var g=q.grid;
  var grid='<div class="figure-grid">'+
    '<div class="figure-cell">'+cellH(g.TL,q.size)+'</div>'+
    '<div class="figure-cell">'+cellH(g.TR,q.size)+'</div>'+
    '<div class="figure-cell">'+cellH(g.BL,q.size)+'</div>'+
    '<div class="figure-cell bottom-right">?</div></div>';
  var opts='<div class="opts">'+q.options.map(function(o,i){return '<div class="opt'+(i===q.correct?' correct':'')+'">'+cellH(o,Math.round(q.size*0.78))+'<span class="lbl">'+L[i]+')</span></div>';}).join('')+'</div>';
  return '<div class="card"><div class="tier">'+q.tier+'</div>'+grid+opts+'<div class="exp">'+q.exp+'</div></div>';
}).join('');
</script></body></html>
