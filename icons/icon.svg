<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#2563eb"/>
  <!-- Brain / head silhouette representing competences -->
  <!-- Stylized "K" letter with checkmark motif -->
  <g fill="white">
    <!-- Letter K stem -->
    <rect x="140" y="120" width="52" height="272" rx="12"/>
    <!-- K upper arm -->
    <path d="M192 256 L352 120 L392 120 L232 264 Z" rx="10"/>
    <!-- K lower arm -->
    <path d="M232 248 L392 392 L352 392 L192 256 Z" rx="10"/>
    <!-- Checkmark circle overlay bottom-right -->
  </g>
  <!-- Small checkmark badge -->
  <circle cx="368" cy="368" r="72" fill="#1d4ed8" stroke="white" stroke-width="6"/>
  <polyline points="340,368 360,390 400,346" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
